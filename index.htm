<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cigarette Count Sheet</title>
    <style>
        /* Base Styles */
        body { font-family: sans-serif; padding: 10px; background-color: black; color: white; }
        .title { width: 100%; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-start; }
        .section { border: 1px solid white; padding: 10px; background-color: #333; }
        .grid-container { display: grid; gap: 0; }
        input { padding: 8px 5px; border: 1px solid white; box-sizing: border-box; width: 100%; background-color: #444; color: white; text-align: center; font-size: 16px; }
        input:focus { outline: none; border-color: #007bff; }
        .header, .label { font-weight: bold; text-align: center; background-color: #555; color: white; padding: 5px; border: 1px solid white; font-size: 0.9em; }
        .calculated { background-color: #000; font-weight: bold; color: #4CAF50; }
        
        /* GHOST TEXT CSS - This makes the placeholders look ominous/faint */
        input::placeholder {
            color: rgba(255, 255, 255, 0.2); 
            font-style: italic;
            font-size: 0.85em;
        }

        /* Buttons */
        .button-group { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; font-size: 1em; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
        .btn-clear { background-color: #dc3545; }
        .btn-save { background-color: #28a745; }
        .btn-history { background-color: #007bff; }
        
        /* History Dashboard Overlay */
        #history-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000;
            display: none; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        .close-history { position: sticky; top: 0; background: #444; width: 100%; margin-bottom: 10px; padding: 15px; font-weight: bold; text-align: center; border: none; color: white; border-radius: 5px; cursor: pointer; z-index: 1001; }
        
        /* Bulk Action Bar */
        .bulk-bar { 
            position: sticky; top: 55px; background: #222; padding: 10px; 
            display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #555; 
            margin-bottom: 20px; z-index: 1001; border-radius: 5px;
        }
        .bulk-bar label { font-size: 0.9em; cursor: pointer; }
        .btn-delete-selected { background: #dc3545; padding: 5px 10px; font-size: 0.8em; display: none; }

        /* History Card Styles */
        .history-card { background: #222; border: 2px solid #555; margin-bottom: 30px; padding: 10px; border-radius: 8px; position: relative; }
        .history-card-title { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #555; padding-bottom: 8px; margin-bottom: 15px; gap: 10px; }
        .card-controls { display: flex; align-items: center; gap: 10px; }
        .history-checkbox { transform: scale(1.4); cursor: pointer; }
        .btn-delete-single { background: #6c757d; padding: 5px 10px; font-size: 0.7em; }
        .btn-delete-single:hover { background: #dc3545; }
        
        /* Mini-Sheet Layout */
        .mini-sheet { transform: scale(0.85); transform-origin: top center; margin-bottom: -30px; }
        .mini-val { border: 1px solid #666; background: #111; padding: 4px; text-align: center; font-size: 0.8em; min-height: 20px; }
        .mini-header { background: #444; font-size: 0.75em; font-weight: bold; text-align: center; border: 1px solid #666; }
    </style>
</head>
<body>

    <div class="title">Cigarette Count Sheet</div>

    <div id="main-form">
        <div class="container">
            <div class="section">
                <div class="grid-container" style="grid-template-columns: 1fr 1fr; width: 180px;">
                    <div class="header" style="grid-column: 1 / 3;">Wall Rack</div>
                    <div class="header">Left</div><div class="header">Right</div>
                    <input type="number" id="wr_l_1" oninput="calculate()"> <input type="number" id="wr_r_1" oninput="calculate()">
                    <input type="number" id="wr_l_2" oninput="calculate()"> <input type="number" id="wr_r_2" oninput="calculate()">
                    <input type="number" id="wr_l_3" oninput="calculate()"> <input type="number" id="wr_r_3" oninput="calculate()">
                    <input type="number" id="wr_l_4" oninput="calculate()"> <input type="number" id="wr_r_4" oninput="calculate()">
                    <input type="number" id="wr_l_5" oninput="calculate()"> <input type="number" id="wr_r_5" oninput="calculate()">
                    <input type="number" id="wr_l_6" oninput="calculate()"> <input type="number" id="wr_r_6" oninput="calculate()">
                    <input type="number" id="wr_l_7" oninput="calculate()"> <input type="number" id="wr_r_7" oninput="calculate()">
                    <input type="number" id="wr_l_8" oninput="calculate()"> <input type="number" id="wr_r_8" oninput="calculate()">
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="section"><div class="header">Cigars</div><input type="number" id="cigars" oninput="calculate()"></div>
                <div class="section"><div class="header">Box</div><input type="number" id="pack_box_input" oninput="calculate()"></div>
                <div class="section"><div class="header">Date</div><input type="date" id="count_date" oninput="saveCurrentData()"></div>
            </div>

            <div class="section">
                <div class="grid-container" style="grid-template-columns: 1fr 1fr; width: 180px;">
                    <div class="header">Reg 2</div><div class="header">Reg 1</div>
                    <div class="label">R1</div><div class="label">R1</div>
                    <input type="number" id="reg2_r1" oninput="calculate()"> <input type="number" id="reg1_r1" oninput="calculate()">
                    <div class="label">R2</div><div class="label">R2</div>
                    <input type="number" id="reg2_r2" oninput="calculate()"> <input type="number" id="reg1_r2" oninput="calculate()">
                    <div class="label">R3</div><div class="label">R3</div>
                    <input type="number" id="reg2_r3" oninput="calculate()"> <input type="number" id="reg1_r3" oninput="calculate()">
                </div>
            </div>
        </div>

        <div class="container" style="margin-top: 15px;">
            <div class="section">
                <div class="grid-container" style="grid-template-columns: 1fr; width: 150px;">
                    <div class="label">Back Room</div><input type="number" id="back_room_qty" oninput="calculate()">
                    <div class="label">Top Shelf</div><input type="number" id="top_shelf_qty" oninput="calculate()">
                    <div class="label">Drawer</div><input type="number" id="back_drawer" oninput="calculate()">
                </div>
            </div>
            <div class="section" style="width: 150px;">
                <div class="grid-container" style="grid-template-columns: 1fr;">
                    <div class="label">Damaged</div><input type="number" id="damaged" oninput="calculate()">
                    <div class="label">Pack Total</div><input type="number" id="pack_total" class="calculated" readonly>
                    <div class="label">Carton Total</div><input type="number" id="carton_total" class="calculated" readonly>
                    <div class="label">Final Total</div><input type="number" id="total" class="calculated" readonly>
                </div>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button class="btn-history" onclick="openHistory()">History Log</button>
        <button class="btn-save" onclick="manualSave()">Save Snapshot</button>
        <button class="btn-clear" onclick="clearSheet()">Clear All</button>
    </div>

    <div id="history-overlay">
        <button class="close-history" onclick="closeHistory()">← CLOSE HISTORY</button>
        
        <div class="bulk-bar" id="bulk-bar" style="display:none;">
            <input type="checkbox" id="select-all" onclick="toggleAll(this.checked)" style="transform: scale(1.4);">
            <label for="select-all">Select All</label>
            <button class="btn-delete-selected" id="delete-selected-btn" onclick="deleteSelected()">Delete Selected</button>
        </div>

        <div id="history-content"></div>
    </div>

    <script>
        const STORAGE_KEY = 'cig_sheet_data';
        const HISTORY_KEY = 'cig_sheet_history';
        const INPUT_IDS = [
            'wr_l_1', 'wr_r_1', 'wr_l_2', 'wr_r_2', 'wr_l_3', 'wr_r_3', 'wr_l_4', 'wr_r_4', 'wr_l_5', 'wr_r_5', 'wr_l_6', 'wr_r_6', 'wr_l_7', 'wr_r_7', 'wr_l_8', 'wr_r_8',
            'cigars', 'pack_box_input', 'count_date', 'reg2_r1', 'reg1_r1', 'reg2_r2', 'reg1_r2', 'reg2_r3', 'reg1_r3', 'damaged', 'back_room_qty', 'top_shelf_qty', 'back_drawer'
        ];

        function calculate() {
            let pTotal = 0, cTotal = 0;
            const pFields = ['wr_l_1', 'wr_r_1', 'wr_l_2', 'wr_r_2', 'wr_l_3', 'wr_r_3', 'wr_l_4', 'wr_r_4', 'wr_l_5', 'wr_r_5', 'wr_l_6', 'wr_r_6', 'wr_l_7', 'wr_r_7', 'wr_l_8', 'wr_r_8', 'cigars', 'pack_box_input', 'reg2_r1', 'reg1_r1', 'reg2_r2', 'reg1_r2', 'reg2_r3', 'reg1_r3', 'damaged'];
            const cFields = ['back_room_qty', 'top_shelf_qty', 'back_drawer'];
            
            pFields.forEach(id => pTotal += parseFloat(document.getElementById(id).value) || 0);
            cFields.forEach(id => cTotal += parseFloat(document.getElementById(id).value) || 0);

            document.getElementById('pack_total').value = pTotal;
            document.getElementById('carton_total').value = cTotal;
            document.getElementById('total').value = pTotal + (cTotal * 10);
            saveCurrentData();
        }

        function saveCurrentData() {
            const data = {};
            INPUT_IDS.forEach(id => data[id] = document.getElementById(id).value);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // UPDATED: This function now handles ghost placeholders
        function loadSession() {
            // 1. Load any data currently being typed (from storage)
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (saved) {
                INPUT_IDS.forEach(id => { if(saved[id]) document.getElementById(id).value = saved[id]; });
            }

            // 2. Load the most recent History entry to use as "Ghost Numbers"
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            if (history.length > 0) {
                const lastEntry = history[0].fullData;
                INPUT_IDS.forEach(id => {
                    const input = document.getElementById(id);
                    if (input && input.type === "number" && lastEntry[id]) {
                        // Set the value as a placeholder (ghost text)
                        input.placeholder = lastEntry[id];
                    }
                });
            }
            
            calculate();
        }

        function manualSave() {
            addHistoryEntry("Manual Save");
            alert("Snapshot saved to history!");
            loadSession(); // Refresh ghost text immediately
        }

        function addHistoryEntry(type) {
            const total = document.getElementById('total').value;
            if (total == 0) return;

            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const snapshot = {
                id: Date.now(), 
                type: type,
                timestamp: new Date().toLocaleString(),
                date: document.getElementById('count_date').value || "No Date",
                fullData: JSON.parse(localStorage.getItem(STORAGE_KEY))
            };

            history.unshift(snapshot);
            if (history.length > 20) history.pop(); 
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function clearSheet() {
            if (!confirm("Save backup and clear?")) return;
            addHistoryEntry("End of Shift");
            INPUT_IDS.forEach(id => {
                const input = document.getElementById(id);
                if (input) input.value = '';
            });
            localStorage.removeItem(STORAGE_KEY);
            loadSession(); // This resets the sheet and shows the new ghost numbers
        }

        /* HISTORY MANAGEMENT LOGIC */

        function openHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const container = document.getElementById('history-content');
            const bulkBar = document.getElementById('bulk-bar');
            
            if (history.length === 0) {
                container.innerHTML = '<p style="text-align:center">No history found.</p>';
                bulkBar.style.display = 'none';
            } else {
                bulkBar.style.display = 'flex';
                document.getElementById('select-all').checked = false;
                updateBulkDeleteButton();
                renderHistoryCards(history);
            }
            document.getElementById('history-overlay').style.display = 'block';
        }

        function renderHistoryCards(history) {
            const container = document.getElementById('history-content');
            container.innerHTML = '';

            history.forEach((item, idx) => {
                const d = item.fullData;
                const total = ( (parseFloat(d.wr_l_1)||0) + (parseFloat(d.wr_r_1)||0) + (parseFloat(d.wr_l_2)||0) + (parseFloat(d.wr_r_2)||0) + (parseFloat(d.wr_l_3)||0) + (parseFloat(d.wr_r_3)||0) + (parseFloat(d.wr_l_4)||0) + (parseFloat(d.wr_r_4)||0) + (parseFloat(d.wr_l_5)||0) + (parseFloat(d.wr_r_5)||0) + (parseFloat(d.wr_l_6)||0) + (parseFloat(d.wr_r_6)||0) + (parseFloat(d.wr_l_7)||0) + (parseFloat(d.wr_r_7)||0) + (parseFloat(d.wr_l_8)||0) + (parseFloat(d.wr_r_8)||0) + (parseFloat(d.cigars)||0) + (parseFloat(d.pack_box_input)||0) + (parseFloat(d.reg2_r1)||0) + (parseFloat(d.reg1_r1)||0) + (parseFloat(d.reg2_r2)||0) + (parseFloat(d.reg1_r2)||0) + (parseFloat(d.reg2_r3)||0) + (parseFloat(d.reg1_r3)||0) + (parseFloat(d.damaged)||0) ) + ( ( (parseFloat(d.back_room_qty)||0) + (parseFloat(d.top_shelf_qty)||0) + (parseFloat(d.back_drawer)||0) ) * 10);

                container.innerHTML += `
                    <div class="history-card">
                        <div class="history-card-title">
                            <input type="checkbox" class="history-checkbox" data-id="${item.id}" onclick="updateBulkDeleteButton()">
                            <div style="flex-grow:1;"><strong>${item.date}</strong><br><small>${item.timestamp}</small></div>
                            <div class="card-controls">
                                <button onclick="restoreFromHistory(${idx})" style="background:#28a745; padding: 5px 10px; font-size:0.7em;">RESTORE</button>
                                <button class="btn-delete-single" onclick="deleteEntry(${item.id})">DELETE</button>
                            </div>
                        </div>
                        <div class="mini-sheet">
                            <div class="container">
                                <div class="section">
                                    <div class="grid-container" style="grid-template-columns: 1fr 1fr; width: 140px;">
                                        <div class="mini-header" style="grid-column: 1/3;">Wall Rack</div>
                                        <div class="mini-val">${d.wr_l_1||0}</div><div class="mini-val">${d.wr_r_1||0}</div>
                                        <div class="mini-val">${d.wr_l_2||0}</div><div class="mini-val">${d.wr_r_2||0}</div>
                                        <div class="mini-val">${d.wr_l_3||0}</div><div class="mini-val">${d.wr_r_3||0}</div>
                                        <div class="mini-val">${d.wr_l_4||0}</div><div class="mini-val">${d.wr_r_4||0}</div>
                                        <div class="mini-val">${d.wr_l_5||0}</div><div class="mini-val">${d.wr_r_5||0}</div>
                                        <div class="mini-val">${d.wr_l_6||0}</div><div class="mini-val">${d.wr_r_6||0}</div>
                                        <div class="mini-val">${d.wr_l_7||0}</div><div class="mini-val">${d.wr_r_7||0}</div>
                                        <div class="mini-val">${d.wr_l_8||0}</div><div class="mini-val">${d.wr_r_8||0}</div>
                                    </div>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:10px;">
                                    <div class="section"><div class="mini-header">Cigars</div><div class="mini-val">${d.cigars||0}</div></div>
                                    <div class="section"><div class="mini-header">Box</div><div class="mini-val">${d.pack_box_input||0}</div></div>
                                </div>
                                <div class="section">
                                    <div class="grid-container" style="grid-template-columns: 1fr 1fr; width: 140px;">
                                        <div class="mini-header" style="grid-column: 1/3;">Registers</div>
                                        <div class="mini-val">${d.reg2_r1||0}</div><div class="mini-val">${d.reg1_r1||0}</div>
                                        <div class="mini-val">${d.reg2_r2||0}</div><div class="mini-val">${d.reg1_r2||0}</div>
                                        <div class="mini-val">${d.reg2_r3||0}</div><div class="mini-val">${d.reg1_r3||0}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="container" style="margin-top:10px;">
                                <div class="section">
                                    <div class="grid-container" style="grid-template-columns: 1fr; width: 120px;">
                                        <div class="mini-header">Inventory</div>
                                        <div class="mini-val">BR: ${d.back_room_qty||0}</div>
                                        <div class="mini-val">TS: ${d.top_shelf_qty||0}</div>
                                        <div class="mini-val">DR: ${d.back_drawer||0}</div>
                                    </div>
                                </div>
                                <div class="section">
                                    <div class="grid-container" style="grid-template-columns: 1fr; width: 120px;">
                                        <div class="mini-header" style="background:#000; color:#4CAF50">TOTAL</div>
                                        <div class="mini-val" style="color:#4CAF50; font-weight:bold">${total}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function toggleAll(checked) {
            const checkboxes = document.querySelectorAll('.history-checkbox');
            checkboxes.forEach(cb => cb.checked = checked);
            updateBulkDeleteButton();
        }

        function updateBulkDeleteButton() {
            const checkedCount = document.querySelectorAll('.history-checkbox:checked').length;
            const btn = document.getElementById('delete-selected-btn');
            btn.style.display = checkedCount > 0 ? 'block' : 'none';
            btn.innerText = `Delete Selected (${checkedCount})`;
        }

        function deleteEntry(id) {
            if (!confirm("Permanently delete this entry?")) return;
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = history.filter(item => item.id !== id);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            openHistory(); // Refresh view
            loadSession(); // Update placeholders
        }

        function deleteSelected() {
            const checkedBoxes = document.querySelectorAll('.history-checkbox:checked');
            const idsToDelete = Array.from(checkedBoxes).map(cb => parseInt(cb.dataset.id));
            
            if (!confirm(`Delete ${idsToDelete.length} selected entries?`)) return;
            
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = history.filter(item => !idsToDelete.includes(item.id));
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            openHistory(); // Refresh view
            loadSession(); // Update placeholders
        }

        function closeHistory() { document.getElementById('history-overlay').style.display = 'none'; }

        function restoreFromHistory(idx) {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY));
            const data = history[idx].fullData;
            INPUT_IDS.forEach(id => document.getElementById(id).value = data[id] || '');
            calculate();
            closeHistory();
            alert("Sheet restored successfully!");
        }

        window.onload = loadSession;
    </script>
</body>
</html>
